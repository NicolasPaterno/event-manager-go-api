basePath: /
definitions:
  models.Event:
    properties:
      date_time:
        example: "2026-01-01T22:45:00Z"
        type: string
      description:
        example: Descrição do evento
        type: string
      id:
        example: 1
        type: integer
      location:
        example: São Paulo
        type: string
      name:
        example: Festa
        type: string
      user_id:
        example: 1
        type: integer
    required:
    - date_time
    - description
    - location
    - name
    type: object
  models.UserCredentials:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: senha123
        type: string
    required:
    - email
    - password
    type: object
host: localhost:8080
info:
  contact:
    name: API Support
  description: API de eventos com autenticação JWT
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Minimal GoAPI
  version: "1.0"
paths:
  /events:
    get:
      description: Retorna a lista completa de eventos
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Lista todos os eventos
      tags:
      - events
    post:
      consumes:
      - application/json
      description: Cria um novo evento (requer autenticação)
      parameters:
      - description: Dados do evento
        in: body
        name: event
        required: true
        schema:
          $ref: '#/definitions/models.Event'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Cria novo evento
      tags:
      - events
  /events/{id}:
    delete:
      description: Remove um evento (apenas o dono)
      parameters:
      - description: ID do evento
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Deleta evento
      tags:
      - events
    get:
      description: Retorna um evento específico pelo ID
      parameters:
      - description: ID do evento
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Event'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Busca evento por ID
      tags:
      - events
    put:
      consumes:
      - application/json
      description: Atualiza um evento existente (apenas o dono)
      parameters:
      - description: ID do evento
        in: path
        name: id
        required: true
        type: integer
      - description: Dados do evento
        in: body
        name: event
        required: true
        schema:
          $ref: '#/definitions/models.Event'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Atualiza evento
      tags:
      - events
  /events/{id}/register:
    delete:
      description: Remove o registro do usuário em um evento
      parameters:
      - description: ID do evento
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Cancelar inscrição
      tags:
      - events
    post:
      description: Registra o usuário autenticado em um evento
      parameters:
      - description: ID do evento
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Inscrever em evento
      tags:
      - events
  /login:
    post:
      consumes:
      - application/json
      description: Autentica usuário e retorna token JWT
      parameters:
      - description: Email e senha
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/models.UserCredentials'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - auth
  /signup:
    post:
      consumes:
      - application/json
      description: Cria uma nova conta de usuário
      parameters:
      - description: Email e senha
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/models.UserCredentials'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Cadastro de usuário
      tags:
      - auth
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
